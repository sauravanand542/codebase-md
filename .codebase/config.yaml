version: 1
generators:
- claude
- cursor
- agents
- codex
- windsurf
- generic
scan:
  exclude:
  - node_modules
  - .venv
  - dist
  - build
  - __pycache__
  - .git
  depth: full
  registries: true
hooks:
  post_commit: true
  pre_push: false
depshift:
  auto_check: true
  severity_threshold: medium
